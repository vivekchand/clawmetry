<div class="page" id="page-brain">
  <div style="padding:12px 0 8px 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-size:14px;font-weight:700;color:var(--text-primary);">🧠 Brain -- Unified Activity Stream</span>
      <div style="
        display:flex;
        align-items:center;
        gap:8px;
        "><span id="brain-live-indicator"></span><button class="refresh-btn" onclick="loadBrainPage()">↻ Refresh</button></div>
    </div>
    <!-- Advisor: ask questions about your agent's activity -->
    <div id="advisor-card" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 16px;
      margin-bottom:12px;
      display:none;
      ">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:14px;font-weight:700;color:#c4b5fd;">✨ Advisor</span>
        <span style="font-size:11px;color:var(--text-muted);">ask anything about this agent's activity</span>
      </div>
      <div style="display:flex;gap:8px;">
        <input id="advisor-q" type="text"
          placeholder="e.g. why did my last run cost so much?"
          onkeydown="if(event.key==='Enter')advisorAsk()"
          style="flex:1;padding:10px 12px;background:var(--bg-primary);border:1px solid var(--border);
                 border-radius:8px;color:var(--text-primary);font-size:13px;outline:none;" />
        <button onclick="advisorAsk()"
          style="padding:10px 18px;background:#a855f7;color:#fff;border:none;border-radius:8px;
                 font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(168,85,247,0.3);">Ask</button>
      </div>
      <div id="advisor-suggestions" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">
        <button class="advisor-sugg" onclick="advisorPrefill('Why did my last run cost so much?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;">
          Why did my last run cost so much?</button>
        <button class="advisor-sugg" onclick="advisorPrefill('Which tool is failing most often?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;">
          Which tool is failing most often?</button>
        <button class="advisor-sugg" onclick="advisorPrefill('Is my agent looping?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;">
          Is my agent looping?</button>
      </div>
      <div id="advisor-answer-wrap" style="display:none;margin-top:12px;">
        <div id="advisor-answer-q" style="
          font-size:12px;color:var(--text-muted);margin-bottom:6px;font-style:italic;"></div>
        <div id="advisor-answer" style="
          padding:14px 16px;
          background:var(--bg-primary);
          border:1px solid var(--border);
          border-left:3px solid #a855f7;
          border-radius:8px;
          font-size:14px;line-height:1.65;
          color:var(--text-primary);
          max-width:880px;
          "></div>
        <div id="advisor-answer-meta" style="
          font-size:11px;color:var(--text-muted);margin-top:6px;font-family:monospace;"></div>
      </div>
    </div>

    <!-- Self-Evolve: standing review of agent trajectory -->
    <div id="selfevolve-card" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 16px;
      margin-bottom:12px;
      display:none;
      ">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;font-weight:700;color:#60a5fa;">🔄 Self-Evolve</span>
          <span style="font-size:11px;color:var(--text-muted);">how this agent could improve</span>
        </div>
        <button id="selfevolve-run-btn" onclick="selfevolveRun()"
          style="padding:6px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;
                 font-size:12px;font-weight:600;cursor:pointer;">Analyze</button>
      </div>
      <div id="selfevolve-status" style="font-size:11px;color:var(--text-muted);margin-bottom:8px;"></div>
      <div id="selfevolve-findings" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <!-- Activity density chart -->
    <div style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 14px;
      margin-bottom:12px;
      ">
      <div style="
        font-size:11px;
        color:var(--text-muted);
        margin-bottom:6px;
        ">Activity density -- last 60 min (30s buckets)</div>
      <canvas id="brain-density-chart" height="60" style="width:100%;display:block;"></canvas>
    </div>
    <div class="brain-view-toggle">
      
    </div>
    <!-- Source filter chips -->
    <div id="brain-filter-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
      <button class="brain-chip active" data-source="all" onclick="setBrainFilter('all',this)" style="
        padding:3px 10px;
        border-radius:12px;
        border:1px solid #a855f7;
        background:rgba(168,85,247,0.2);
        color:#a855f7;
        font-size:11px;
        cursor:pointer;
        font-weight:600;
        ">All</button>
    </div>
    <!-- Type filter chips (separate container to prevent duplication) -->
    <div id="brain-type-chips" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;"></div>
    <!-- Channel filter chips -->
    <div id="brain-channel-chips" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;"></div>
    <!-- Event stream -->
    <div id="brain-feed" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 14px;
      ">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:11px;color:var(--text-muted);">Live event stream (newest first)</span>
        <span id="brain-new-pill" style="
          display:none;
          background:#a855f7;
          color:#fff;
          border-radius:10px;
          padding:1px 8px;
          font-size:10px;
          font-weight:700;
          cursor:pointer;
          " onclick="scrollBrainToTop()">↑ new events</span>
      </div>
      <div id="brain-stream" style="max-height:calc(100vh - 320px);overflow-y:auto;">
        <div style="color:var(--text-muted);padding:20px">Loading...</div>
      </div>
    </div>
    <div id="brain-graph-wrap" class="brain-graph-container" style="display:none;">
      <canvas id="brain-graph-canvas"></canvas>
    </div>
  </div>
</div><!-- end page-brain -->
