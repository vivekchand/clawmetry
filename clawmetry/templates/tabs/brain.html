<div class="page" id="page-brain">
  <div style="padding:12px 0 8px 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-size:14px;font-weight:700;color:var(--text-primary);">🧠 <span data-i18n="brain.title">Brain · Unified Activity Stream</span></span>
      <div style="
        display:flex;
        align-items:center;
        gap:8px;
        "><span id="brain-live-indicator"></span><button id="brain-plumbing-btn" class="refresh-btn" onclick="toggleBrainPlumbing()" data-i18n-title="brain.plumbing_tooltip" title="Show internal queue/dequeue events (hidden by default, they're plumbing, not content)" style="font-weight:500;"><span id="brain-plumbing-state">○</span> <span data-i18n="brain.show_plumbing">Show plumbing</span> <span id="brain-plumbing-count" style="opacity:0.7;font-size:11px;"></span></button><button id="brain-focus-btn" class="refresh-btn" onclick="toggleBrainFocus()" data-i18n-title="brain.focus_tooltip" title="Focus mode: hide everything except the event stream">⛶ Focus</button><button class="refresh-btn" onclick="loadBrainPage()">↻ <span data-i18n="common.refresh">Refresh</span></button></div>
    </div>
    <style>
      /* Focus mode: hide chrome, expand event stream to viewport */
      body.brain-focus .nav-tabs,
      body.brain-focus #page-brain #advisor-card,
      body.brain-focus #page-brain .brain-density-wrap,
      body.brain-focus #page-brain #brain-filter-chips,
      body.brain-focus #page-brain #brain-type-chips,
      body.brain-focus #page-brain #brain-channel-chips { display: none !important; }
      body.brain-focus #page-brain #brain-stream { max-height: calc(100vh - 80px) !important; }
    </style>
    <script>
      window.toggleBrainFocus = function() {
        var on = document.body.classList.toggle('brain-focus');
        var btn = document.getElementById('brain-focus-btn');
        if (btn) btn.textContent = on ? '✕ Exit focus' : '⛶ Focus';
      };
      // Plumbing toggle: hide QUEUE-OPERATION rows by default. They're
      // internal queue housekeeping (dequeue/enqueue), not agent activity.
      // Default OFF (hidden) per UX feedback — non-technical users see only
      // real conversation turns. Count of hidden rows shows next to label.
      window._brainShowPlumbing = false;
      window.toggleBrainPlumbing = function() {
        window._brainShowPlumbing = !window._brainShowPlumbing;
        var state = document.getElementById('brain-plumbing-state');
        if (state) state.textContent = window._brainShowPlumbing ? '●' : '○';
        if (typeof renderBrainStream === 'function' && window._brainAllEvents) {
          renderBrainStream(window._brainAllEvents);
        }
      };
    </script>
    <!-- Advisor: ask questions about your agent's activity -->
    <div id="advisor-card" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 16px;
      margin-bottom:12px;
      display:none;
      ">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:14px;font-weight:700;color:#c4b5fd;">✨ <span data-i18n="brain.advisor">Advisor</span></span>
        <span style="font-size:11px;color:var(--text-muted);" data-i18n="brain.advisor_hint">ask anything about this agent's activity</span>
      </div>
      <div style="display:flex;gap:8px;">
        <input id="advisor-q" type="text"
          data-i18n-placeholder="brain.advisor_placeholder"
          placeholder="e.g. why did my last run cost so much?"
          onkeydown="if(event.key==='Enter')advisorAsk()"
          style="flex:1;padding:10px 12px;background:var(--bg-primary);border:1px solid var(--border);
                 border-radius:8px;color:var(--text-primary);font-size:13px;outline:none;" />
        <button onclick="advisorAsk()"
          style="padding:10px 18px;background:#a855f7;color:#fff;border:none;border-radius:8px;
                 font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(168,85,247,0.3);" data-i18n="brain.ask">Ask</button>
      </div>
      <div id="advisor-suggestions" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">
        <button class="advisor-sugg" onclick="advisorPrefill('Why did my last run cost so much?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;" data-i18n="brain.sugg_cost">
          Why did my last run cost so much?</button>
        <button class="advisor-sugg" onclick="advisorPrefill('Which tool is failing most often?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;" data-i18n="brain.sugg_tool">
          Which tool is failing most often?</button>
        <button class="advisor-sugg" onclick="advisorPrefill('Is my agent looping?')"
          style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(168,85,247,0.1);
                 border:1px solid rgba(168,85,247,0.2);color:#c4b5fd;cursor:pointer;" data-i18n="brain.sugg_loop">
          Is my agent looping?</button>
      </div>
      <!-- Contextual link to the standalone Self-Evolve page. Hidden until
           the probe confirms auth, so users without Anthropic creds don't
           see a dead-end link. -->
      <div id="advisor-selfevolve-hint" style="display:none;margin-top:8px;font-size:11px;color:var(--text-muted);">
        <span data-i18n="brain.selfevolve_hint">Want a structured review with severity-ranked findings instead?</span>
        <a href="#selfevolve" onclick="switchTab('selfevolve');return false;"
           style="color:#60a5fa;text-decoration:none;font-weight:600;cursor:pointer;" data-i18n="brain.run_selfevolve">
          Run Self-Evolve →
        </a>
      </div>
      <div id="advisor-answer-wrap" style="display:none;margin-top:12px;">
        <div id="advisor-answer-q" style="
          font-size:12px;color:var(--text-muted);margin-bottom:6px;font-style:italic;"></div>
        <div id="advisor-answer" style="
          padding:14px 16px;
          background:var(--bg-primary);
          border:1px solid var(--border);
          border-left:3px solid #a855f7;
          border-radius:8px;
          font-size:14px;line-height:1.65;
          color:var(--text-primary);
          max-width:880px;
          "></div>
        <div id="advisor-answer-meta" style="
          font-size:11px;color:var(--text-muted);margin-top:6px;font-family:monospace;"></div>
      </div>
    </div>

    <!-- Activity density chart -->
    <div class="brain-density-wrap" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 14px;
      margin-bottom:12px;
      ">
      <div style="
        font-size:11px;
        color:var(--text-muted);
        margin-bottom:6px;
        " data-i18n="brain.activity_density">Activity density · last 60 min (30s buckets)</div>
      <canvas id="brain-density-chart" height="60" style="width:100%;display:block;"></canvas>
    </div>
    <div class="brain-view-toggle" data-i18n-title="brain.view_toggle_tooltip" title="Switch between list view and neural-network view">
      <button class="brain-view-btn active" data-view="list" onclick="setBrainViewMode('list', this)" data-i18n="brain.view_list">List</button>
      <button class="brain-view-btn" data-view="graph" onclick="setBrainViewMode('graph', this)" data-i18n-title="brain.view_graph_tooltip" title="Neural-network visualization of agent activity (closes #53)" data-i18n="brain.view_graph">Graph</button>
    </div>
    <!-- Source filter chips -->
    <div id="brain-filter-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
      <button class="brain-chip active" data-source="all" onclick="setBrainFilter('all',this)" style="
        padding:3px 10px;
        border-radius:12px;
        border:1px solid #a855f7;
        background:rgba(168,85,247,0.2);
        color:#a855f7;
        font-size:11px;
        cursor:pointer;
        font-weight:600;
        " data-i18n="brain.filter_all">All</button>
    </div>
    <!-- Type filter chips (separate container to prevent duplication) -->
    <div id="brain-type-chips" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;"></div>
    <!-- Channel filter chips -->
    <div id="brain-channel-chips" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;"></div>
    <!-- Event stream -->
    <div id="brain-feed" style="
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 14px;
      ">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:11px;color:var(--text-muted);" data-i18n="brain.live_event_stream">Live event stream (newest first)</span>
        <span id="brain-new-pill" style="
          display:none;
          background:#a855f7;
          color:#fff;
          border-radius:10px;
          padding:1px 8px;
          font-size:10px;
          font-weight:700;
          cursor:pointer;
          " onclick="scrollBrainToTop()">↑ <span data-i18n="brain.new_events">new events</span></span>
      </div>
      <div id="brain-stream" style="max-height:calc(100vh - 320px);overflow-y:auto;">
        <div style="color:var(--text-muted);padding:20px;font-size:13px;" data-i18n="brain.loading_activity">Loading recent activity…</div>
      </div>
    </div>
    <div id="brain-graph-wrap" class="brain-graph-container" style="display:none;">
      <canvas id="brain-graph-canvas"></canvas>
    </div>
  </div>
</div><!-- end page-brain -->
