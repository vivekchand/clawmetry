<div class="page" id="page-transcripts">
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadTranscripts()">↻ Refresh</button>
    <button class="refresh-btn" id="transcript-plumbing-btn" onclick="toggleTranscriptPlumbing()" title="Show Self-Evolve sessions — the agent's own self-review runs (FIX mode + re-analyze), hidden by default because they're plumbing, not your sessions" style="font-weight:500;display:none"><span id="transcript-plumbing-state">○</span> Show plumbing <span id="transcript-plumbing-count" style="opacity:0.7;font-size:11px;"></span></button>
    <button class="refresh-btn" id="transcript-back-btn" style="display:none" onclick="showTranscriptList()">← Back to list</button>
  </div>
  <div class="card" id="transcript-list">Loading...</div>
  <div id="transcript-viewer" style="display:none">
    <div class="transcript-viewer-meta" id="transcript-meta"></div>
    <!-- Authority footprint panel (#880) — populated async by _loadAuthorityPanel() -->
    <div id="authority-panel" style="display:none;margin-bottom:10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <div id="authority-panel-toggle" onclick="document.getElementById('authority-panel-body').style.display=document.getElementById('authority-panel-body').style.display==='none'?'':'none'" style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;">
        <span style="font-size:12px;font-weight:700;color:var(--text-primary);">&#128274; Authority Footprint</span>
        <span id="authority-panel-summary" style="font-size:11px;color:var(--text-muted);"></span>
      </div>
      <div id="authority-panel-body" style="padding:0 12px 10px 12px;display:none;"></div>
    </div>
    <!-- Session Replay Controls -->
    <div id="replay-controls" style="
      display:none;
      background:var(--bg-secondary);
      border:1px solid var(--border-secondary);
      border-radius:10px;
      padding:12px 14px;
      margin-bottom:10px;
      ">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
        <button id="replay-prev" onclick="replayPrev()" style="
          padding:5px 12px;
          border-radius:6px;
          border:none;
          background:var(--button-bg);
          color:var(--text-primary);
          cursor:pointer;
          font-size:14px;
          ">&#9664;</button>
        <span id="replay-pos" style="
          font-size:13px;
          color:var(--text-muted);
          min-width:60px;
          text-align:center;
          ">0/0</span>
        <button id="replay-next" onclick="replayNext()" style="
          padding:5px 12px;
          border-radius:6px;
          border:none;
          background:var(--button-bg);
          color:var(--text-primary);
          cursor:pointer;
          font-size:14px;
          ">&#9654;</button>
        <input type="range" id="replay-scrubber" min="0" max="0" value="0" oninput="replayJumpTo(parseInt(this.value))" style="
          flex:1;
          min-width:120px;
          accent-color:#6366f1;
          ">
        <button id="replay-raw-toggle" onclick="toggleTranscriptRaw()" title="Toggle between the beautified turn and the exact JSON payload OpenClaw recorded" style="
          padding:5px 12px;
          border-radius:6px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          cursor:pointer;
          font-size:12px;
          font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
          white-space:nowrap;
          ">{ } Raw</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="replay-filter active-filter" data-type="all" onclick="replayFilter('all')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:#6366f1;
          color:#fff;
          font-size:12px;
          cursor:pointer;
          ">All</button>
        <button class="replay-filter" data-type="tool_use" onclick="replayFilter('tool_use')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#128295; Tools</button>
        <button class="replay-filter" data-type="thinking" onclick="replayFilter('thinking')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#129504; Thinking</button>
        <button class="replay-filter" data-type="assistant" onclick="replayFilter('assistant')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#129776; AI</button>
        <button class="replay-filter" data-type="user" onclick="replayFilter('user')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#128100; User</button>
      </div>
    </div>
    <div class="chat-messages" id="transcript-messages"></div>
  </div>
</div>
