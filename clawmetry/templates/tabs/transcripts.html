<div class="page" id="page-transcripts">
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadTranscripts()">↻ Refresh</button>
    <button class="refresh-btn" id="transcript-back-btn" style="display:none" onclick="showTranscriptList()">← Back to list</button>
  </div>
  <!-- Session type filter chips -->
  <div id="session-type-filters" style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
    <button class="session-type-chip active-type-chip" data-type="all" onclick="filterSessionType('all')" style="
      padding:5px 14px;border-radius:20px;border:1px solid var(--border-secondary);
      background:#6366f1;color:#fff;font-size:12px;cursor:pointer;font-weight:600;
      ">All</button>
    <button class="session-type-chip" data-type="main" onclick="filterSessionType('main')" style="
      padding:5px 14px;border-radius:20px;border:1px solid var(--border-secondary);
      background:var(--button-bg);color:var(--text-secondary);font-size:12px;cursor:pointer;
      ">🖥️ Main <span class="type-count" id="type-count-main"></span></button>
    <button class="session-type-chip" data-type="heartbeat" onclick="filterSessionType('heartbeat')" style="
      padding:5px 14px;border-radius:20px;border:1px solid var(--border-secondary);
      background:var(--button-bg);color:var(--text-secondary);font-size:12px;cursor:pointer;
      ">💓 Heartbeat <span class="type-count" id="type-count-heartbeat"></span></button>
    <button class="session-type-chip" data-type="subagent" onclick="filterSessionType('subagent')" style="
      padding:5px 14px;border-radius:20px;border:1px solid var(--border-secondary);
      background:var(--button-bg);color:var(--text-secondary);font-size:12px;cursor:pointer;
      ">🤖 Sub-agent <span class="type-count" id="type-count-subagent"></span></button>
    <button class="session-type-chip" data-type="user" onclick="filterSessionType('user')" style="
      padding:5px 14px;border-radius:20px;border:1px solid var(--border-secondary);
      background:var(--button-bg);color:var(--text-secondary);font-size:12px;cursor:pointer;
      ">💬 User <span class="type-count" id="type-count-user"></span></button>
  </div>
  <!-- Per-type summary cards -->
  <div id="session-type-summary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px;"></div>
  <div class="card" id="transcript-list">Loading...</div>
  <div id="transcript-viewer" style="display:none">
    <div class="transcript-viewer-meta" id="transcript-meta"></div>
    <!-- Session Replay Controls -->
    <div id="replay-controls" style="
      display:none;
      background:var(--bg-secondary);
      border:1px solid var(--border-secondary);
      border-radius:10px;
      padding:12px 14px;
      margin-bottom:10px;
      ">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
        <button id="replay-prev" onclick="replayPrev()" style="
          padding:5px 12px;
          border-radius:6px;
          border:none;
          background:var(--button-bg);
          color:var(--text-primary);
          cursor:pointer;
          font-size:14px;
          ">&#9664;</button>
        <span id="replay-pos" style="
          font-size:13px;
          color:var(--text-muted);
          min-width:60px;
          text-align:center;
          ">0/0</span>
        <button id="replay-next" onclick="replayNext()" style="
          padding:5px 12px;
          border-radius:6px;
          border:none;
          background:var(--button-bg);
          color:var(--text-primary);
          cursor:pointer;
          font-size:14px;
          ">&#9654;</button>
        <input type="range" id="replay-scrubber" min="0" max="0" value="0" oninput="replayJumpTo(parseInt(this.value))" style="
          flex:1;
          min-width:120px;
          accent-color:#6366f1;
          ">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="replay-filter active-filter" data-type="all" onclick="replayFilter('all')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:#6366f1;
          color:#fff;
          font-size:12px;
          cursor:pointer;
          ">All</button>
        <button class="replay-filter" data-type="tool_use" onclick="replayFilter('tool_use')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#128295; Tools</button>
        <button class="replay-filter" data-type="thinking" onclick="replayFilter('thinking')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#129504; Thinking</button>
        <button class="replay-filter" data-type="assistant" onclick="replayFilter('assistant')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#129776; AI</button>
        <button class="replay-filter" data-type="user" onclick="replayFilter('user')" style="
          padding:4px 10px;
          border-radius:20px;
          border:1px solid var(--border-secondary);
          background:var(--button-bg);
          color:var(--text-secondary);
          font-size:12px;
          cursor:pointer;
          ">&#128100; User</button>
      </div>
    </div>
    <div class="chat-messages" id="transcript-messages"></div>
  </div>
</div>
