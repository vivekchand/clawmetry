<div class="page" id="page-memory">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:16px;flex-wrap:wrap;">
    <div>
      <div style="font-size:18px;font-weight:700;color:var(--text-primary);">Memory</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">What your agent remembers &mdash; about you, about itself, and day-to-day notes.</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <div class="mem-view-tab" data-view="summary" onclick="memorySwitchView('summary')" style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-secondary);border:1px solid var(--border-primary);color:var(--text-primary);">Summary</div>
      <div class="mem-view-tab" data-view="all" onclick="memorySwitchView('all')" style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;border:1px solid transparent;color:var(--text-muted);">All files</div>
      <button class="refresh-btn" onclick="loadMemory()" style="margin-left:8px;">&#8635;</button>
    </div>
  </div>

  <!-- SUMMARY VIEW — commit-log style history over curated files -->
  <div id="memory-summary-view">
    <div style="display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:500px;">

      <!-- LEFT: file list + commit timeline -->
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:8px;padding:6px;">
          <div id="selfconfig-files-inner" style="color:var(--text-muted);font-size:12px;padding:6px;">Loading...</div>
        </div>
        <div id="selfconfig-timeline-wrap" style="background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:8px;padding:12px 10px;display:none;">
          <div style="font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text-muted);text-transform:uppercase;padding:0 6px 8px 6px;" id="selfconfig-timeline-heading">Recent changes</div>
          <div id="selfconfig-timeline" style="font-size:12px;"></div>
        </div>
      </div>

      <!-- RIGHT: content viewer (always inhabited) -->
      <div id="selfconfig-reader" style="background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:8px;padding:0;overflow:hidden;min-height:500px;display:flex;flex-direction:column;">
        <div id="selfconfig-reader-banner" style="display:none;padding:10px 16px;background:rgba(99,102,241,0.08);border-bottom:1px solid rgba(99,102,241,0.2);font-size:12px;color:var(--text-secondary);align-items:center;gap:12px;justify-content:space-between;">
          <div id="selfconfig-reader-banner-text">Viewing a past version</div>
          <button id="selfconfig-reader-back" onclick="selfconfigBackToNow()" style="background:transparent;border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;">Back to now</button>
        </div>
        <div id="selfconfig-reader-header" style="padding:16px 22px 8px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span id="selfconfig-reader-icon" style="font-size:22px;">&#128270;</span>
          <span id="selfconfig-reader-title" style="font-size:17px;font-weight:700;color:var(--text-primary);">Pick something on the left</span>
          <span id="selfconfig-reader-badge" style="display:none;background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.4);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;">&#9888; Sensitive</span>
        </div>
        <div id="selfconfig-reader-sub" style="padding:0 22px 12px 22px;font-size:12px;color:var(--text-muted);"></div>
        <div id="selfconfig-reader-body" style="flex:1;padding:8px 22px 20px 22px;overflow-y:auto;font-size:14px;line-height:1.65;color:var(--text-primary);"></div>
      </div>

    </div>
  </div>

  <!-- ALL FILES VIEW -->
  <div id="memory-all-view" style="display:none;">
    <div id="memory-analytics-panel" style="margin-bottom:12px"></div>
    <div class="card" id="memory-list">Loading...</div>
    <div class="file-viewer" id="file-viewer">
      <div class="file-viewer-header">
        <span class="file-viewer-title" id="file-viewer-title"></span>
        <button class="file-viewer-close" onclick="closeFileViewer()">&times; Close</button>
      </div>
      <div class="file-viewer-content" id="file-viewer-content"></div>
    </div>
  </div>
</div>
