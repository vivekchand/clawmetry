<div class="page" id="page-skills">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <div>
      <div style="font-size:18px;font-weight:700;color:var(--text-primary);">&#127381; Skills</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Shortcuts your agent can use. Click a skill to browse its files.</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="refresh-btn" onclick="document.getElementById('skills-browser').style.display='none';document.getElementById('skills-list').style.display='';">&#9776; Grid</button>
      <button class="refresh-btn" onclick="loadSkills()">&#8635; Refresh</button>
    </div>
  </div>
  <div id="skills-summary-row" style="display:flex;gap:12px;flex-wrap:wrap;margin:14px 0 16px 0;"></div>
  <div id="skills-list"><div style="color:var(--text-muted);font-size:13px;padding:16px;">Loading...</div></div>
  <!-- Skills Browser (file explorer view) -->
  <div id="skills-browser" style="display:none;height:calc(100vh - 240px);min-height:400px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
    <div style="display:flex;height:100%;">
      <div id="skills-browser-tree" style="width:260px;border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;font-size:12px;background:var(--bg-secondary);"></div>
      <div id="skills-browser-content" style="flex:1;overflow-y:auto;padding:16px 20px;">
        <div style="color:var(--text-muted);text-align:center;padding:60px 20px;">Select a file to view its content</div>
      </div>
    </div>
  </div>
</div><!-- end page-skills -->
