<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦞 ClawMetry — Global Installs</title>
  <meta name="description" content="ClawMetry PyPI installs worldwide — powered by ClickHouse data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0B0F1A;
      --accent:   #E5443A;
      --muted:    #94A3B8;
      --card:     #111827;
      --border:   rgba(255,255,255,0.08);
      --text:     #F1F5F9;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Globe container fills viewport ── */
    #globe-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Top nav bar ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      background: rgba(11,15,26,0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
    }
    .nav-logo span { color: var(--accent); }
    .nav-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── Stats pill bottom-center ── */
    #stats-bar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(17,24,39,0.85);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .stat-pill .val {
      color: var(--accent);
      font-weight: 700;
    }
    .stat-pill .lbl {
      color: var(--muted);
    }

    /* ── Hover tooltip ── */
    #tooltip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      background: rgba(10,12,22,0.9);
      border: 1px solid rgba(229,68,58,0.35);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      line-height: 1.5;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .flag { font-size: 18px; margin-right: 4px; }
    #tooltip .country { font-weight: 600; color: var(--text); }
    #tooltip .count { color: var(--accent); font-weight: 700; }
    #tooltip .label { color: var(--muted); }

    /* ── Loading state ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-size: 14px;
      color: var(--muted);
      gap: 10px;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(229,68,58,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Legend ── */
    #legend {
      position: fixed;
      top: 72px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Globe -->
  <div id="globe-container"></div>

  <!-- Nav -->
  <nav>
    <a href="/" class="nav-logo">🦞 Claw<span>Metry</span></a>
    <a href="/" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to site
    </a>
  </nav>

  <!-- Stats bar -->
  <div id="stats-bar">
    <div class="stat-pill">
      <span>📦</span>
      <span class="val" id="stat-total">—</span>
      <span class="lbl">total downloads</span>
    </div>
    <div class="stat-pill">
      <span>🌍</span>
      <span class="val" id="stat-countries">—</span>
      <span class="lbl">countries</span>
    </div>
    <div class="stat-pill">
      <span style="color:#E5443A;">●</span>
      <span class="lbl">top 10</span>
      <span style="width:1px;height:12px;background:var(--border);margin:0 2px;"></span>
      <span style="color:#4A9EFF;">●</span>
      <span class="lbl">other</span>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip">
    <span class="flag" id="tt-flag"></span><span class="country" id="tt-country"></span>
    <br/>
    <span class="count" id="tt-count"></span> <span class="label">downloads</span>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#E5443A;box-shadow:0 0 6px rgba(229,68,58,0.6);"></div>
      Top 10 countries
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4A9EFF;box-shadow:0 0 6px rgba(74,158,255,0.4);"></div>
      All other countries
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    Loading install data...
  </div>

  <script src="//unpkg.com/globe.gl"></script>
  <script>
    function countryFlag(code) {
      if (!code || code.length !== 2) return '🌐';
      return [...code.toUpperCase()]
        .map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65))
        .join('');
    }

    function logScale(val, min, max, outMin, outMax) {
      if (max <= min) return (outMin + outMax) / 2;
      var t = (Math.log1p(val) - Math.log1p(min)) / (Math.log1p(max) - Math.log1p(min));
      return outMin + t * (outMax - outMin);
    }

    function fmt(n) { return Number(n).toLocaleString('en-US'); }

    var tooltip   = document.getElementById('tooltip');
    var ttFlag    = document.getElementById('tt-flag');
    var ttCountry = document.getElementById('tt-country');
    var ttCount   = document.getElementById('tt-count');
    var loading   = document.getElementById('loading');

    // Init globe (empty, points added after fetch)
    var globe = Globe()(document.getElementById('globe-container'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#1a3a5c')
      .atmosphereAltitude(0.15)
      .width(window.innerWidth)
      .height(window.innerHeight)
      .pointsData([])
      .pointLat('lat')
      .pointLng('lng')
      .pointAltitude('alt')
      .pointRadius('radius')
      .pointColor('color')
      .pointsMerge(false)
      .pointLabel(() => '');

    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.15;
    globe.controls().enableDamping = true;

    // Resize
    window.addEventListener('resize', function() {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    // Hover tooltip
    globe.onPointHover(function(point, ev) {
      if (!point) {
        tooltip.classList.remove('visible');
        return;
      }
      ttFlag.textContent = countryFlag(point.country_code);
      ttCountry.textContent = ' ' + point.country_name;
      ttCount.textContent = fmt(point.downloads);
      tooltip.classList.add('visible');
    });

    document.addEventListener('mousemove', function(e) {
      if (tooltip.classList.contains('visible')) {
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top  = (e.clientY + 16) + 'px';
      }
    });

    // Fetch live data
    fetch('/api/pypi-countries')
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        var countries = data.countries || [];
        var total     = data.total_downloads || 0;
        var ncountries = data.total_countries || 0;

        if (!countries.length) throw new Error('no data');

        var dlMin = countries[countries.length - 1].downloads;
        var dlMax = countries[0].downloads; // already sorted desc
        var top10 = new Set(countries.slice(0, 10).map(function(c) { return c.country_code; }));

        var points = countries.map(function(c) {
          return {
            lat: c.lat,
            lng: c.lng,
            alt: logScale(c.downloads, dlMin, dlMax, 0.005, 0.08),
            radius: logScale(c.downloads, dlMin, dlMax, 0.3, 1.2),
            color: top10.has(c.country_code) ? '#E5443A' : '#4A9EFF',
            country_code: c.country_code,
            country_name: c.country_name,
            downloads: c.downloads,
          };
        });

        globe.pointsData(points);

        document.getElementById('stat-total').textContent = fmt(total);
        document.getElementById('stat-countries').textContent = ncountries + '+';

        loading.classList.add('hidden');
      })
      .catch(function(err) {
        console.warn('[globe] fetch failed:', err);
        loading.textContent = 'Could not load data. Refresh to retry.';
      });
  </script>
</body>
</html>
