name: Apply required E2E status checks (C6 -- one-shot)

# Runs scripts/apply_required_status_checks.py to configure required
# status checks on main across all three repos.
#
# Triggers:
#   workflow_dispatch -- manual trigger.
#     confirm=APPLY  : apply (or verify if using GITHUB_TOKEN).
#     confirm=dry-run: preview without making changes (default).
#     pat_token      : optional fine-grained PAT with Administration
#                      (read+write) on clawmetry, clawmetry-cloud,
#                      clawmetry-landing.  Pasting a PAT here closes
#                      C6 directly from the GitHub Actions UI -- no
#                      local clone, no gh CLI, no secret setup needed.
#                      The token is masked via ::add-mask:: before use.
#
#   push to main -- runs apply_required_status_checks.py.
#     With only GITHUB_TOKEN (ghs_): read-only verify path in the script
#     (exits 0 if C6 configured, exits 1 if not -- no admin rights needed).
#     With E2E_ADMIN_PAT: full apply + verify.
#     On failure, posts a notification comment on tracking issue #3864.
#
# TOKEN PATHS (priority order):
#   1. inputs.pat_token  -- PAT typed into the Run workflow dialog
#   2. secrets.E2E_ADMIN_PAT -- pre-stored repo secret
#   3. github.token (ghs_) -- read-only verify via public branch endpoint
#
# NOTE: administration:write is intentionally absent from permissions.
#   It is NOT a valid GITHUB_TOKEN permission in Actions; requesting it
#   caused GitHub to reject all workflow runs before any jobs were queued
#   (conclusion: failure, total_jobs: 0).  Branch-protection writes
#   require a PAT or OAuth token with admin rights (see token paths above).
#
# REQUIREMENTS (to auto-apply on every push):
#   Set repo secret E2E_ADMIN_PAT to a fine-grained PAT with
#   Administration (read+write) on clawmetry, clawmetry-cloud,
#   clawmetry-landing.
#
# Idempotent: running multiple times is safe.
# Tracking: vivekchand/clawmetry#3864

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to configure repos (anything else = dry run)"
        required: true
        default: "dry-run"
      pat_token:
        description: |
          Optional: fine-grained PAT with Administration (read+write) on
          clawmetry, clawmetry-cloud, clawmetry-landing.
          Paste here to close C6 from the browser -- no local setup needed.
          Leave blank to use E2E_ADMIN_PAT secret (or GITHUB_TOKEN read-only).
        required: false
        default: ""
  push:
    branches: [main]

# contents:read is required for actions/checkout.
# issues:write is required for the C6 gap notification step.
# administration:write is intentionally absent (see note above).
permissions:
  contents: read
  issues: write

jobs:
  apply-required-checks:
    name: Apply required E2E status checks (C6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Preview checks (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'APPLY'
        run: |
          echo "=== DRY RUN -- checks that will be added when confirm=APPLY ==="
          echo ""
          if [ -z "${{ inputs.pat_token }}" ] && [ -z "${{ secrets.E2E_ADMIN_PAT }}" ]; then
            echo "  No admin token available (neither pat_token input nor E2E_ADMIN_PAT secret)."
            echo "  Quickest path: paste a fine-grained PAT into the pat_token input and"
            echo "  re-run with confirm=APPLY.  No local setup required."
            echo ""
            echo "  PAT permissions needed: Administration (read+write) on:"
            echo "    clawmetry, clawmetry-cloud, clawmetry-landing"
          elif [ -n "${{ inputs.pat_token }}" ]; then
            echo "  Using pat_token input -- will apply to all 3 repos:"
            echo "  clawmetry         : OSS golden path (wheel + OpenClaw + 9 tabs)"
            echo "  clawmetry         : Cross-repo handoff (C4)"
            echo "  clawmetry         : MOAT Keystone (13-endpoint bar)"
            echo "  clawmetry         : E2E Browser Tests (critical subset)"
            echo "  clawmetry-cloud   : Cloud golden-path browser E2E"
            echo "  clawmetry-landing : Landing golden path (C3)"
          else
            echo "  Using E2E_ADMIN_PAT secret -- will apply to all 3 repos:"
            echo "  clawmetry         : OSS golden path (wheel + OpenClaw + 9 tabs)"
            echo "  clawmetry         : Cross-repo handoff (C4)"
            echo "  clawmetry         : MOAT Keystone (13-endpoint bar)"
            echo "  clawmetry         : E2E Browser Tests (critical subset)"
            echo "  clawmetry-cloud   : Cloud golden-path browser E2E"
            echo "  clawmetry-landing : Landing golden path (C3)"
          fi
          echo ""
          echo "  Deprecated checks removed if present:"
          echo "  clawmetry : visual-diff (paths: filter -- stalls non-UI PRs)"
          echo ""
          echo "Re-run with confirm=APPLY to apply."

      - name: Mask PAT token
        if: inputs.pat_token != ''
        run: echo "::add-mask::${{ inputs.pat_token }}"

      - name: Apply required status checks
        id: c6_verify
        if: github.event_name == 'push' || github.event.inputs.confirm == 'APPLY'
        env:
          GITHUB_TOKEN: ${{ inputs.pat_token || secrets.E2E_ADMIN_PAT || github.token }}
          CONFIRM_INPUT: ${{ inputs.confirm || '' }}
        run: python3 scripts/apply_required_status_checks.py

      # When the C6 read-only verify exits 1 (checks not yet configured on main),
      # post or update a comment on the E2E Robustness tracking issue #3864 so the
      # repo admin receives a GitHub notification.
      #
      # Only fires on push-to-main (the automated verify path), NOT on manual
      # workflow_dispatch runs (those already have the confirm/pat_token UI in-scope).
      # Also skips if checkout failed (c6_verify would be skipped, not failed).
      - name: Notify tracking issue when C6 checks are missing
        if: failure() && github.event_name == 'push' && steps.c6_verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- c6-notify-bot -->"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          BODY="${MARKER}
          ## C6: Required status checks not configured on clawmetry/main

          The [apply-required-checks workflow](${RUN_URL}) detected that required E2E status checks are NOT configured on \`clawmetry/main\`. PRs can currently merge without E2E passing.

          **Missing checks:**
          - \`OSS golden path (wheel + OpenClaw + 9 tabs)\`
          - \`Cross-repo handoff (C4)\`
          - \`MOAT Keystone (13-endpoint bar)\`
          - \`E2E Browser Tests (critical subset)\`

          **Fix option A (60 seconds, no PAT needed -- GitHub Settings UI):**
          Go to: https://github.com/vivekchand/clawmetry/settings/branches
          Edit main > Require status checks > add the 4 names above.

          **Fix option B (30 seconds, terminal):**
          \`\`\`bash
          bash scripts/close-c6.sh
          \`\`\`

          **Fix option C (Actions one-shot, fine-grained PAT with Administration read+write):**
          Actions > 'Apply required E2E status checks (C6 -- one-shot)' > Run workflow
          confirm=APPLY, pat_token=paste-token-here

          Once any option above is done, the next push to main self-heals to green."

          # Upsert: update existing comment if present, otherwise create new.
          existing_id=$(gh api -X GET \
            "repos/${REPO}/issues/3864/comments" \
            --jq 'map(select(.body | startswith("<!-- c6-notify-bot -->"))) | .[0].id // empty' \
            2>/dev/null || echo "")
          if [ -n "${existing_id}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing_id}" \
              -f body="${BODY}" > /dev/null
            echo "Updated existing C6 notification on #3864 (comment ${existing_id})"
          else
            gh api -X POST "repos/${REPO}/issues/3864/comments" \
              -f body="${BODY}" > /dev/null
            echo "Posted new C6 notification on #3864"
          fi
