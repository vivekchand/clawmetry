name: i18n docs autotranslate

# Regenerates docs/i18n/<lang>/README.md from README.md via the Claude Code CLI
# (no API key; set CLAUDE_CODE_OAUTH_TOKEN from `claude setup-token`). English
# README.md is the source of truth; idempotent via a source-hash marker, so only
# READMEs whose English source changed are re-translated. Skips if no token.

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated locale codes (blank = all enabled)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  translate-docs:
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Guard - require Claude Code token
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set - skipping docs autotranslate. Generate one with 'claude setup-token' and add it as a repo secret, or run scripts/i18n_translate_docs.py locally where Claude Code is signed in."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-python@v6
        if: env.SKIP != '1'
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code

      - name: Translate README into all locales
        if: env.SKIP != '1'
        run: |
          python3 scripts/i18n_translate_docs.py \
            --readme README.md \
            --locales-dir clawmetry/static/locales \
            --out-dir docs/i18n \
            --only "${{ github.event.inputs.only }}"

      - name: Open sync PR
        if: env.SKIP != '1'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/i18n-docs-autotranslate
          delete-branch: true
          commit-message: 'docs(i18n): sync translated READMEs'
          title: 'docs(i18n): sync translated READMEs'
          labels: i18n
          body: |
            Automated translation of `README.md` into `docs/i18n/<lang>/README.md`.
            Generated by `scripts/i18n_translate_docs.py` (Claude Code CLI). English
            `README.md` is the source of truth. Review and merge.
