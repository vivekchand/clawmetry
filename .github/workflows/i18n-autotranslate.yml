name: i18n autotranslate

# Fans new/changed English keys out to every enabled locale via the Claude API,
# then opens a "chore(i18n): sync translations" PR. English (en.json) is the
# single source of truth. Idempotent: only the delta is translated.
# Requires the ANTHROPIC_API_KEY repo secret (skips gracefully if unset).

on:
  push:
    branches: [main]
    paths:
      - 'clawmetry/static/locales/en.json'
      - 'clawmetry/static/locales/_meta.json'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated locale codes to translate (blank = all enabled)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  autotranslate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need the previous en.json to detect CHANGED keys

      - name: Guard - require API key
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set - skipping autotranslate. Add it in Settings > Secrets and variables > Actions."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        if: env.SKIP != '1'
        run: pip install anthropic

      - name: Translate deltas
        if: env.SKIP != '1'
        run: |
          python3 scripts/i18n_autotranslate.py \
            --locales-dir clawmetry/static/locales \
            --since "${{ github.event.before || 'HEAD~1' }}" \
            --only "${{ github.event.inputs.only }}"

      - name: Open sync PR
        if: env.SKIP != '1'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/i18n-autotranslate
          delete-branch: true
          commit-message: 'chore(i18n): sync translations (autotranslate bot)'
          title: 'chore(i18n): sync translations'
          labels: i18n
          body: |
            Automated translation of new/changed English keys into all enabled locales.

            Generated by `scripts/i18n_autotranslate.py` (Claude). English `en.json`
            is the source of truth; only the delta was translated, orphans pruned,
            placeholder/markdown integrity enforced. Review and merge.
