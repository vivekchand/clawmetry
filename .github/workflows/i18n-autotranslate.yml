name: i18n autotranslate

# Fans new/changed English keys out to every enabled locale via the Claude API,
# then opens a "chore(i18n): sync translations" PR. English (en.json) is the
# single source of truth. Idempotent: only the delta is translated.
# Uses the Claude Code CLI (no API key). Set CLAUDE_CODE_OAUTH_TOKEN (from
# `claude setup-token`) as a repo secret, or run the script locally where Claude
# Code is signed in. Skips gracefully if the token is unset.

on:
  push:
    branches: [main]
    paths:
      - 'clawmetry/static/locales/en.json'
      - 'clawmetry/static/locales/_meta.json'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated locale codes to translate (blank = all enabled)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  autotranslate:
    runs-on: ubuntu-latest
    env:
      # Claude Code subscription token (from `claude setup-token`), NOT an Anthropic API key.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need the previous en.json to detect CHANGED keys

      - name: Guard - require Claude Code token
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set - skipping autotranslate. Generate one with 'claude setup-token' and add it as a repo secret, OR just run the bot locally where Claude Code is signed in: python3 scripts/i18n_autotranslate.py --locales-dir clawmetry/static/locales"
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code

      - name: Translate deltas (via Claude Code CLI, no API key)
        if: env.SKIP != '1'
        run: |
          python3 scripts/i18n_autotranslate.py \
            --engine claude-cli \
            --locales-dir clawmetry/static/locales \
            --since "${{ github.event.before || 'HEAD~1' }}" \
            --only "${{ github.event.inputs.only }}"

      - name: Open sync PR
        if: env.SKIP != '1'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/i18n-autotranslate
          delete-branch: true
          commit-message: 'chore(i18n): sync translations (autotranslate bot)'
          title: 'chore(i18n): sync translations'
          labels: i18n
          body: |
            Automated translation of new/changed English keys into all enabled locales.

            Generated by `scripts/i18n_autotranslate.py` (Claude). English `en.json`
            is the source of truth; only the delta was translated, orphans pruned,
            placeholder/markdown integrity enforced. Review and merge.
